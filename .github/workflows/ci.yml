name: CI Pipeline - LogiTech

# Executa em qualquer Push ou Pull Request para a branch principal ou de etapa
on:
  push:
    branches: [ "main", "01-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Executar Testes Unitários (Pytest)
        run: |
          pytest test_main.py